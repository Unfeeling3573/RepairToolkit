name: Build Windows EXE

on:
  push:
    branches: [main, v2-dev]
  workflow_dispatch:

permissions:
  contents: read

# Ajout de cette variable pour forcer l'utilisation de Node.js 24 et retirer l'avertissement
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des librairies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pyinstaller fpdf

      - name: Compilation en .exe
        run: |
          pyinstaller --noconsole --onedir --uac-admin --icon=logo.ico --name "Windows_Repair_Toolkit" main.py

      - name: Mise à disposition du dossier du logiciel
        uses: actions/upload-artifact@v4
        with:
          name: Mon_Logiciel_Windows
          path: dist/Windows_Repair_Toolkit

  build-mac:
    runs-on: macos-15-intel

    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des librairies
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter pyinstaller fpdf

      - name: Compilation en .app (Mac)
        run: |
          pyinstaller --noconsole --windowed --name "Mac_Repair_Toolkit" main.py
          cd dist
          zip -r Mac_Repair_Toolkit.zip Mac_Repair_Toolkit.app

      - name: Mise à disposition de l'application Mac
        uses: actions/upload-artifact@v4
        with:
          name: Mon_Logiciel_Mac
          path: dist/Mac_Repair_Toolkit.zip
